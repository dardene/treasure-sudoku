<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cinzel',serif;background:#080402;color:#f5c842;min-height:100vh;padding:32px 20px 60px;}
h1{text-align:center;font-size:22px;letter-spacing:.25em;color:#f5c842;margin-bottom:6px;}
.subtitle{text-align:center;font-size:11px;color:rgba(200,160,80,.6);letter-spacing:.2em;margin-bottom:32px;}

/* ── TIER SECTIONS ── */
.tier-section{margin-bottom:40px;}
.tier-label{font-size:11px;letter-spacing:.35em;font-weight:700;padding:6px 14px;border-radius:20px;display:inline-block;margin-bottom:18px;}
.tier-label.rare{color:#60d8ff;background:rgba(80,200,255,.08);border:1px solid rgba(80,200,255,.25);}
.tier-label.epic{color:#b060ff;background:rgba(170,80,255,.08);border:1px solid rgba(170,80,255,.25);}
.tier-label.legendary{color:#ffd700;background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.3);}

/* ── GRID ── */
.artifact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;}

/* ── CARD ── */
.card{background:rgba(18,10,3,.85);border-radius:14px;padding:16px 12px 14px;text-align:center;
  border:1px solid rgba(100,70,20,.4);transition:transform .2s,box-shadow .2s;cursor:default;position:relative;}
.card:hover{transform:translateY(-4px);}
.card.rare:hover{box-shadow:0 8px 30px rgba(80,200,255,.3);}
.card.epic:hover{box-shadow:0 8px 30px rgba(170,80,255,.3);}
.card.legendary:hover{box-shadow:0 8px 30px rgba(255,200,0,.4);}

/* rarity border accent */
.card.rare{border-top:2px solid rgba(80,200,255,.5);}
.card.epic{border-top:2px solid rgba(170,80,255,.5);}
.card.legendary{border-top:2px solid rgba(255,200,0,.6);}

/* index badge */
.card-num{position:absolute;top:8px;left:10px;font-size:9px;color:rgba(180,140,60,.5);letter-spacing:.05em;}

/* icon */
.card-icon{width:72px;height:72px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;}
.card-icon svg{width:100%;height:100%;}

/* name */
.card-name{font-size:11px;font-weight:700;letter-spacing:.08em;margin-bottom:3px;line-height:1.3;}
.card.rare .card-name{color:#c8f0ff;}
.card.epic .card-name{color:#d8b8ff;}
.card.legendary .card-name{color:#ffe070;}

/* rarity + rune */
.card-rarity{font-size:9px;letter-spacing:.2em;font-weight:700;margin-bottom:6px;}
.card.rare .card-rarity{color:#60d8ff;}
.card.epic .card-rarity{color:#b060ff;}
.card.legendary .card-rarity{color:#ffd700;}

/* description */
.card-desc{font-family:'Crimson Pro',serif;font-style:italic;font-size:10px;color:rgba(200,160,80,.7);line-height:1.5;}

/* pip */
.card-pip{width:8px;height:8px;border-radius:50%;margin:8px auto 0;}
.card.rare .card-pip{background:#60d8ff;box-shadow:0 0 6px rgba(80,200,255,.8);}
.card.epic .card-pip{background:#b060ff;box-shadow:0 0 6px rgba(170,80,255,.8);}
.card.legendary .card-pip{background:#ffd700;box-shadow:0 0 8px rgba(255,200,0,.9);}
</style>
</head>

function buildCards(tier, containerId) {
  const container = document.getElementById(containerId);
  JIGSAW_ARTIFACTS.forEach((art, i) => {
    if (!art || art.rarity !== tier) return;
    const card = document.createElement('div');
    card.className = 'card ' + art.rarity.toLowerCase();
    const glowStyle = `filter:drop-shadow(0 0 14px ${art.glow})`;
    const runeStr = art.rune ? ` · <span style="font-size:14px;">${art.rune}</span>` : '';
    card.innerHTML = `
      <div class="card-num">#${i}</div>
      <div class="card-icon" style="${glowStyle}">${art.svg}</div>
      <div class="card-name">${art.name}</div>
      <div class="card-rarity">${art.rarity.toUpperCase()}${runeStr}</div>
      <div class="card-desc">${art.desc}</div>
      <div class="card-pip"></div>
    `;
    container.appendChild(card);
  });
}

buildCards('Rare', 'rare-grid');
buildCards('Epic', 'epic-grid');
buildCards('Legendary', 'legendary-grid');
</script>
</body>
</html>
